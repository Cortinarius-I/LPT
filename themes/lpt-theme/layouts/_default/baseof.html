<!DOCTYPE html>
<html lang="en">
<head>
  {{- partial "head.html" . -}}
</head>
<body>
  {{- partial "logo-loader.html" . -}}
  {{- partial "nav.html" . -}}

  <main id="page" class="page-content">
    {{- block "main" . }}{{- end }}
  </main>

  {{- partial "footer.html" . -}}

  <script>
    // Logo loader animation controller
    (function() {
      const seen = sessionStorage.getItem('lpt-loaded');
      const loader = document.getElementById('loader');
      const page = document.getElementById('page');
      const nav = document.getElementById('nav');

      if (seen) {
        // Skip animation on revisit
        if (loader) loader.style.display = 'none';
        if (page) page.classList.add('visible');
        if (nav) nav.classList.add('visible');
        return;
      }

      sessionStorage.setItem('lpt-loaded', '1');

      // Phase 3: Decelerate pinwheel and dock logo
      setTimeout(function() {
        var logoAnim = document.getElementById('logo-anim');
        if (logoAnim) {
          logoAnim.classList.add('decelerate');
          logoAnim.classList.add('logo-docked');
        }
      }, 2400);

      // Phase 4: Show page
      setTimeout(function() {
        if (loader) loader.classList.add('fade-out');
        if (page) page.classList.add('visible');
        if (nav) nav.classList.add('visible');
      }, 3100);

      // Phase 5: Hide animated logo after static nav logo is visible
      setTimeout(function() {
        var logoAnim = document.getElementById('logo-anim');
        if (logoAnim) {
          logoAnim.style.display = 'none';
        }
      }, 3800);
    })();
  </script>
</body>
</html>
